<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Científica</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculadora{
    background:#1f2937;
    padding:20px;
    border-radius:20px;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

#pantalla{
    width:100%;
    height:50px;
    font-size:22px;
    margin-bottom:15px;
    text-align:right;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#111827;
    color:#fff;
}

.botones{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:8px;
}

button{
    padding:15px;
    font-size:16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

/* Números */
.numero{
    background:#e5e7eb;
}

/* Operaciones */
.operador{
    background:#60a5fa;
    color:white;
}

/* Igual */
.igual{
    background:#34d399;
    color:white;
}

/* Borrar */
.borrar{
    background:#f87171;
    color:white;
}

/* Hover */
button:hover{
    transform:scale(1.05);
    opacity:0.9;
}
</style>
</head>

<body>

<div class="calculadora">

<input type="text" id="pantalla">

<div class="botones">

<button class="numero" onclick="agregar('7')">7</button>
<button class="numero" onclick="agregar('8')">8</button>
<button class="numero" onclick="agregar('9')">9</button>
<button class="operador" onclick="agregar('/')">÷</button>
<button class="borrar" onclick="borrar()">C</button>

<button class="numero" onclick="agregar('4')">4</button>
<button class="numero" onclick="agregar('5')">5</button>
<button class="numero" onclick="agregar('6')">6</button>
<button class="operador" onclick="agregar('*')">×</button>
<button class="operador" onclick="agregar('Math.PI')">π</button>

<button class="numero" onclick="agregar('1')">1</button>
<button class="numero" onclick="agregar('2')">2</button>
<button class="numero" onclick="agregar('3')">3</button>
<button class="operador" onclick="agregar('-')">−</button>
<button class="operador" onclick="sqrt()">√</button>

<button class="numero" onclick="agregar('0')">0</button>
<button class="numero" onclick="agregar('.')">.</button>
<button class="igual" onclick="calcular()">=</button>
<button class="operador" onclick="agregar('+')">+</button>
<button class="operador" onclick="potencia()">x²</button>

<button class="operador" onclick="sin()">sin</button>
<button class="operador" onclick="cos()">cos</button>
<button class="operador" onclick="tan()">tan</button>
<button class="operador" onclick="log()">log</button>
<button class="operador" onclick="ln()">ln</button>

</div>
</div>

<script>
function agregar(valor){
document.getElementById("pantalla").value += valor;
}

function borrar(){
document.getElementById("pantalla").value = "";
}

function calcular(){
try{
document.getElementById("pantalla").value = eval(document.getElementById("pantalla").value);
}catch{
alert("Error");
}
}

function sin(){
let x = document.getElementById("pantalla").value;
document.getElementById("pantalla").value = Math.sin(x);
}

function cos(){
let x = document.getElementById("pantalla").value;
document.getElementById("pantalla").value = Math.cos(x);
}

function tan(){
let x = document.getElementById("pantalla").value;
document.getElementById("pantalla").value = Math.tan(x);
}

function log(){
let x = document.getElementById("pantalla").value;
document.getElementById("pantalla").value = Math.log10(x);
}

function ln(){
let x = document.getElementById("pantalla").value;
document.getElementById("pantalla").value = Math.log(x);
}

function sqrt(){
let x = document.getElementById("pantalla").value;
document.getElementById("pantalla").value = Math.sqrt(x);
}

function potencia(){
let x = document.getElementById("pantalla").value;
document.getElementById("pantalla").value = Math.pow(x,2);
}
</script>

</body>
</html>
